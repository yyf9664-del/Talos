name: Bug Report
description: Report a bug to help us improve Talos
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below so we can investigate.
        Please keep the discussion specific, respectful, and actionable. Spam, harassment, abuse, or automated low-quality reports may be closed, hidden, locked, or reported.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reliably reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include screenshots if applicable.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (app crash / data loss / stuck UI)
        - High (feature broken but workaround exists)
        - Medium (incorrect behavior, minor impact)
        - Low (cosmetic / minor annoyance)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      multiple: true
      options:
        - Frontend (Chat UI)
        - Frontend (Settings / Models)
        - Frontend (Sidebar / Sessions)
        - Backend (Agent Loop)
        - Backend (API)
        - Backend (Provider / LLM)
        - Backend (MCP / Connectors)
        - Desktop (Tauri shell)
        - Ollama (Local LLM)

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, app version, browser (if web mode), and relevant config.
      placeholder: |
        - OS: macOS 15.3 / Windows 11 / Ubuntu 24.04
        - App version: 0.0.1
        - Mode: Desktop / Web
        - Provider: OpenRouter / Ollama / ChatGPT
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error messages, console logs, or stack traces.
      render: shell

  - type: checkboxes
    id: conduct
    attributes:
      label: Community Guidelines
      options:
        - label: I agree to follow the Talos Code of Conduct and keep this issue constructive, respectful, and relevant.
          required: true
