name: Feature Request
description: Suggest a new feature or enhancement for Talos
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like and why it would be useful.
        Please keep the discussion specific, respectful, and actionable. Spam, harassment, abuse, or automated low-quality requests may be closed, hidden, locked, or reported.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Chat / Conversation
        - Tools / Agent capabilities
        - Models / Providers
        - Settings / Configuration
        - Desktop integration
        - Plugin / MCP system
        - Performance
        - Accessibility / i18n
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links, or anything else that helps explain.

  - type: checkboxes
    id: conduct
    attributes:
      label: Community Guidelines
      options:
        - label: I agree to follow the Talos Code of Conduct and keep this issue constructive, respectful, and relevant.
          required: true
