# Priority
- name: "P0: critical"
  color: "b60205"
  description: "App crash, data loss, stuck UI — must fix immediately"
- name: "P1: high"
  color: "d93f0b"
  description: "Feature broken, poor UX — fix in current cycle"
- name: "P2: medium"
  color: "fbca04"
  description: "Edge case or minor UX issue"
- name: "P3: low"
  color: "0e8a16"
  description: "Cosmetic or nice-to-have"

# Type
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "Improvement to existing feature"
- name: "feature"
  color: "0075ca"
  description: "New feature request"
- name: "refactor"
  color: "d4c5f9"
  description: "Code improvement with no behavior change"
- name: "docs"
  color: "0075ca"
  description: "Documentation only"
- name: "test"
  color: "bfd4f2"
  description: "Test coverage improvement"
- name: "question"
  color: "d876e3"
  description: "Question about using or contributing to Talos"
- name: "security"
  color: "ee0701"
  description: "Security-related work or private vulnerability follow-up"

# Status
- name: "triage"
  color: "ededed"
  description: "Needs review and categorization"
- name: "needs-info"
  color: "fbca04"
  description: "Needs more information from the author"
- name: "invalid"
  color: "e4e669"
  description: "Not valid, actionable, or relevant to the project"
- name: "spam"
  color: "000000"
  description: "Spam, abuse, or automated low-quality content"
- name: "confirmed"
  color: "c5def5"
  description: "Reproduced and accepted"
- name: "wontfix"
  color: "ffffff"
  description: "Decided not to fix"
- name: "duplicate"
  color: "cfd3d7"
  description: "Already tracked in another issue"

# Area
- name: "area: frontend"
  color: "bfdadc"
  description: "Next.js / React / UI"
- name: "area: backend"
  color: "c2e0c6"
  description: "FastAPI / Python / Agent engine"
- name: "area: desktop"
  color: "d4c5f9"
  description: "Tauri / Rust / OS integration"
- name: "area: ollama"
  color: "f9d0c4"
  description: "Local LLM / Ollama integration"
- name: "area: mcp"
  color: "e4e669"
  description: "MCP connectors / plugins"

# Community
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
