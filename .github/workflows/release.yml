name: Release Desktop

on:
  push:
    tags: ["v*"]

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npx next build
        env:
          DESKTOP_BUILD: "true"
          NEXT_PUBLIC_DESKTOP_BUILD: "true"

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          pip install -r requirements.txt pyinstaller
          pyinstaller openyak.spec --noconfirm

      - name: Verify backend bundle
        shell: bash
        run: node scripts/verify-bundle.mjs backend/dist/openyak-backend

      - name: Download Node.js runtime
        run: cd backend && python scripts/download_node.py

      - name: Build Tauri
        shell: bash
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build --config '{"build":{"beforeBuildCommand":""}}'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe.sig

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            node_platform: Darwin-arm64
          - target: x86_64-apple-darwin
            arch: x64
            node_platform: Darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npx next build
        env:
          DESKTOP_BUILD: "true"
          NEXT_PUBLIC_DESKTOP_BUILD: "true"

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt pyinstaller
          pyinstaller openyak.spec --noconfirm

      - name: Verify backend bundle
        env:
          # x86_64 artifacts are cross-compiled on the arm64 runner, so the
          # runtime smoke test can't execute the binary natively. Static
          # checks still run. The aarch64 matrix leg runs the full smoke.
          VERIFY_BUNDLE_SKIP_SMOKE: ${{ matrix.arch == 'x64' && '1' || '0' }}
        run: node scripts/verify-bundle.mjs backend/dist/openyak-backend

      - name: Download Node.js runtime
        run: cd backend && python3 scripts/download_node.py --platform ${{ matrix.node_platform }}

      # Build Tauri WITHOUT notarization — we notarize manually after signing backend binaries
      - name: Build Tauri (no notarization)
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build \
            --target ${{ matrix.target }} \
            --config '{"build":{"beforeBuildCommand":""},"bundle":{"targets":["dmg","app"]}}'

      # Sign all PyInstaller backend binaries inside the .app bundle
      - name: Sign backend binaries in bundle
        env:
          SIGNING_IDENTITY: "Developer ID Application: wangzhang wu (46KF5Z549N)"
        run: |
          BUNDLE_BACKEND="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/OpenYak.app/Contents/Resources/backend"

          # Sign all .dylib and .so files
          find "$BUNDLE_BACKEND" -type f \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" {} \;

          # Sign backend executable
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" "$BUNDLE_BACKEND/openyak-backend"

          # Fix Python.framework symlink structure (Tauri resolves symlinks to regular files)
          FW_PATH="$BUNDLE_BACKEND/_internal/Python.framework"
          if [ -d "$FW_PATH" ]; then
            # Remove broken top-level signature
            rm -rf "$FW_PATH/_CodeSignature"

            # Restore Python symlink
            if [ -f "$FW_PATH/Python" ] && [ ! -L "$FW_PATH/Python" ]; then
              rm "$FW_PATH/Python"
              # Restore Versions/Current symlink
              if [ ! -L "$FW_PATH/Versions/Current" ]; then
                (cd "$FW_PATH/Versions" && ln -s 3.12 Current)
              fi
              ln -s Versions/Current/Python "$FW_PATH/Python"
            fi

            # Sign the actual versioned binary
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" "$FW_PATH/Versions/3.12/Python"
          fi

          # Fix _internal/Python symlink
          PYTHON_BIN="$BUNDLE_BACKEND/_internal/Python"
          if [ -f "$PYTHON_BIN" ] && [ ! -L "$PYTHON_BIN" ]; then
            rm "$PYTHON_BIN"
            ln -s Python.framework/Versions/Current/Python "$PYTHON_BIN"
          fi

      # Re-sign the .app after modifying backend binaries
      - name: Re-sign app bundle
        env:
          SIGNING_IDENTITY: "Developer ID Application: wangzhang wu (46KF5Z549N)"
        run: |
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/OpenYak.app"
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" "$APP_PATH/Contents/MacOS/openyak-desktop"
          codesign --force --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" "$APP_PATH"
          codesign -v --deep "$APP_PATH"

      # Notarize with Apple
      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/OpenYak.app"
          ditto -c -k --keepParent "$APP_PATH" /tmp/OpenYak-notarize.zip
          xcrun notarytool submit /tmp/OpenYak-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Verify backend inside signed .app
        env:
          # Static-only: the bundled binary is codesigned and sandboxed;
          # the earlier "Verify backend bundle" step already ran the
          # full smoke test against the unsigned copy.
          VERIFY_BUNDLE_SKIP_SMOKE: "1"
        run: |
          APP_BACKEND="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/OpenYak.app/Contents/Resources/backend"
          node scripts/verify-bundle.mjs "$APP_BACKEND"

      # Regenerate updater archive and DMG from notarized app
      - name: Regenerate artifacts
        env:
          SIGNING_IDENTITY: "Developer ID Application: wangzhang wu (46KF5Z549N)"
        run: |
          BUNDLE_DIR="desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          ARCH="${{ matrix.arch }}"
          TAR_NAME="OpenYak_${VERSION}_${ARCH}.app.tar.gz"

          # Regenerate updater tar.gz with a versioned filename so each
          # release has its own artifact on the CDN. Previously we shipped
          # "OpenYak.app.tar.gz" for every version, which meant a new
          # upload silently broke the in-place signature in latest.json.
          cd "$BUNDLE_DIR/macos"
          rm -f OpenYak.app.tar.gz OpenYak.app.tar.gz.sig \
                OpenYak_*.app.tar.gz OpenYak_*.app.tar.gz.sig
          tar -czf "$TAR_NAME" OpenYak.app
          cd $GITHUB_WORKSPACE

          # Sign tar.gz with Tauri updater key — signature binds to THIS file
          npx @tauri-apps/cli signer sign "$BUNDLE_DIR/macos/$TAR_NAME"

          # Regenerate DMG with Applications shortcut
          rm -f "$BUNDLE_DIR/dmg/"*.dmg
          DMG_STAGING=$(mktemp -d)
          cp -R "$BUNDLE_DIR/macos/OpenYak.app" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "OpenYak" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$BUNDLE_DIR/dmg/OpenYak_${VERSION}_${ARCH}.dmg"
          rm -rf "$DMG_STAGING"
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" "$BUNDLE_DIR/dmg/"*.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-bundle
          path: |
            desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/OpenYak_*.app.tar.gz
            desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/OpenYak_*.app.tar.gz.sig

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            file \
            patchelf \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri/src-tauri

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build frontend
        run: cd frontend && npx next build
        env:
          DESKTOP_BUILD: "true"
          NEXT_PUBLIC_DESKTOP_BUILD: "true"

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt pyinstaller
          pyinstaller openyak.spec --noconfirm

      - name: Verify backend bundle
        run: node scripts/verify-bundle.mjs backend/dist/openyak-backend

      - name: Download Node.js runtime
        run: |
          cd backend
          source venv/bin/activate
          python scripts/download_node.py

      - name: Sync metadata
        run: node scripts/sync-desktop-meta.mjs

      - name: Build Tauri (.deb + .rpm only)
        run: |
          cd desktop-tauri
          npx @tauri-apps/cli build \
            --config src-tauri/build.linux-x64.json \
            --bundles deb,rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-bundle
          path: |
            desktop-tauri/src-tauri/target/release/bundle/deb/*.deb
            desktop-tauri/src-tauri/target/release/bundle/rpm/*.rpm

  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate SHA-256 checksums
        run: node scripts/generate-checksums.mjs artifacts CHECKSUMS.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body_path: CHECKSUMS.md
          append_body: true
          files: |
            artifacts/windows-bundle/**/*
            artifacts/macos-aarch64-bundle/**/*
            artifacts/macos-x64-bundle/**/*
            artifacts/linux-x64-bundle/**/*

      - name: Generate update manifest
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Read signatures (artifacts have subdirectories: macos/, dmg/, etc.)
          WIN_SIG=$(find artifacts/windows-bundle -name '*.exe.sig' -exec cat {} \; 2>/dev/null || true)
          AARCH64_SIG=$(find artifacts/macos-aarch64-bundle -name '*.app.tar.gz.sig' -exec cat {} \; 2>/dev/null || true)
          X64_SIG=$(find artifacts/macos-x64-bundle -name '*.app.tar.gz.sig' -exec cat {} \; 2>/dev/null || true)

          # Find artifact filenames (versioned since 1.0.8 — so each release
          # has its own file on the CDN and the signature stays valid forever)
          WIN_EXE=$(find artifacts/windows-bundle -name '*.exe' ! -name '*.sig' -exec basename {} \; | head -1)
          AARCH64_TAR=$(find artifacts/macos-aarch64-bundle -name 'OpenYak_*.app.tar.gz' ! -name '*.sig' -exec basename {} \; | head -1)
          X64_TAR=$(find artifacts/macos-x64-bundle -name 'OpenYak_*.app.tar.gz' ! -name '*.sig' -exec basename {} \; | head -1)

          # Fail loud if anything is missing — a broken manifest silently
          # blocks every client's auto-update, which is exactly how 1.0.7
          # ended up with "signature verification failed" everywhere.
          missing=()
          [[ -n "$WIN_SIG"     ]] || missing+=("windows signature")
          [[ -n "$WIN_EXE"     ]] || missing+=("windows installer exe")
          [[ -n "$AARCH64_SIG" ]] || missing+=("macOS aarch64 signature")
          [[ -n "$AARCH64_TAR" ]] || missing+=("macOS aarch64 tar.gz")
          [[ -n "$X64_SIG"     ]] || missing+=("macOS x86_64 signature")
          [[ -n "$X64_TAR"     ]] || missing+=("macOS x86_64 tar.gz")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::cannot generate latest.json — missing: ${missing[*]}"
            find artifacts -type f | sort
            exit 1
          fi

          DOWNLOAD_BASE="https://open-yak.com/downloads"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${DOWNLOAD_BASE}/${WIN_EXE}"
              },
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "${DOWNLOAD_BASE}/${AARCH64_TAR}"
              },
              "darwin-x86_64": {
                "signature": "${X64_SIG}",
                "url": "${DOWNLOAD_BASE}/${X64_TAR}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

          # Sanity-check JSON is well-formed before publishing
          python3 -c "import json,sys; json.load(open('latest.json'))"

      - name: Upload manifest as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
